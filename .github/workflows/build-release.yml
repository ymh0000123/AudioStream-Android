name: Build Release APK

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload APK to the GitHub Release for the selected tag"
        type: boolean
        default: false
      tag_name:
        description: "Release tag to upload to when upload_to_release is enabled"
        type: string
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build signed release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # The wrapper uses a mainland China mirror for local builds. GitHub-hosted
      # runners are more reliable with the official Gradle distribution URL.
      - name: Use official Gradle distribution
        run: |
          sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/#https\\://services.gradle.org/distributions/#' \
            gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      # settings.gradle.kts keeps mainland China mirrors first for local builds.
      # In CI, prefer official repositories so plugin marker resolution is stable.
      - name: Prefer official Maven repositories on CI
        run: |
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/gradle-plugin") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/google") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/central") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/public") }##g' \
            settings.gradle.kts
          cat settings.gradle.kts

      - name: Validate signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Missing KEYSTORE_BASE64 secret" && exit 1)
          test -n "$KEYSTORE_PASSWORD" || (echo "Missing KEYSTORE_PASSWORD secret" && exit 1)
          test -n "$KEY_ALIAS" || (echo "Missing KEY_ALIAS secret" && exit 1)
          test -n "$KEY_PASSWORD" || (echo "Missing KEY_PASSWORD secret" && exit 1)

      - name: Validate manual release upload target
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_to_release }}
        run: test -n "${{ inputs.tag_name }}" || (echo "tag_name is required when upload_to_release is enabled" && exit 1)

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > xiaofeishu.keystore
          test -s xiaofeishu.keystore

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon --no-configuration-cache --stacktrace

      - name: Collect release APK
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/*.apk release/
          ls -lh release

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: audiostream-release-apk
          path: release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload APK to GitHub Release
        if: ${{ github.event_name == 'release' || startsWith(github.ref, 'refs/tags/') || inputs.upload_to_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name || github.ref_name }}
          files: release/*.apk
          fail_on_unmatched_files: true
