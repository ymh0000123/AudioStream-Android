name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # distributionUrl 指向腾讯云镜像,境外 runner 不可达时回退官方源
      - name: Use official Gradle distribution mirror
        run: |
          sed -i 's#https\\://mirrors.cloud.tencent.com/gradle/#https\\://services.gradle.org/distributions/#' \
            gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      # settings.gradle.kts 默认走阿里云镜像(境内开发机用),CI 上让 google()/mavenCentral() 优先
      - name: Prefer official Maven repositories on CI
        run: |
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/gradle-plugin") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/google") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/central") }##g' \
            settings.gradle.kts
          sed -i 's#maven { url = uri("https://maven.aliyun.com/repository/public") }##g' \
            settings.gradle.kts
          echo "--- patched settings.gradle.kts ---"; cat settings.gradle.kts

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --no-daemon --no-configuration-cache --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: audiostream-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
